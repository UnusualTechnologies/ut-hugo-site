<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-bar">
      <div class="footer-identity">
        <span class="footer-meta">
          <a href="mailto:{{ .Site.Params.email }}">Email</a>
          <a href="tel:{{ .Site.Params.phone }}">Phone</a>
          <a href="{{ .Site.Params.linkedinURL }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          <a href="{{ .Site.Params.youtubeURL }}" target="_blank" rel="noopener noreferrer">YouTube</a>
        </span>
      </div>
      <div class="footer-legal">
        <span>&copy; {{ now.Year }} Unusual Technologies</span>
        <a href="{{ "legal/" | relURL }}">Legal</a>
      </div>
    </div>
  </div>
</footer>
