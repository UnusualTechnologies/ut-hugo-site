{{ define "main" }}
<div class="page-gradient">

  <!-- Intro -->
  <section class="section about-intro">
    <p class="about-eyebrow">Concept &amp; Design</p>
    <h1 class="about-headline">From first sketch to final build, we shape <span class="hl">your idea</span> into reality.</h1>
  </section>

  <!-- Step 01 -->
  <section class="section step-section">
    <div class="step step-left">
      <div class="step-text">
        <span class="step-number">01</span>
        <h3 class="step-title">Design Docs & Storyboarding</h3>
      </div>
      <div class="step-image">
        <img src="{{ "images/steps/01-design-docs.png" | relURL }}" alt="Design Docs & Storyboarding">
      </div>
    </div>
  </section>

  <!-- Step 02 -->
  <section class="section step-section">
    <div class="step step-right">
      <div class="step-image">
        <img src="{{ "images/steps/02-planning.png" | relURL }}" alt="Planning & Wireframing">
      </div>
      <div class="step-text">
        <span class="step-number">02</span>
        <h3 class="step-title">Planning & Wireframing</h3>
      </div>
    </div>
  </section>

  <!-- Step 03 -->
  <section class="section step-section">
    <div class="step step-left">
      <div class="step-text">
        <span class="step-number">03</span>
        <h3 class="step-title">Schematics</h3>
      </div>
      <div class="step-image">
        <img src="{{ "images/steps/03-schematics.png" | relURL }}" alt="Schematics">
      </div>
    </div>
  </section>

  <!-- Step 04 -->
  <section class="section step-section">
    <div class="step step-right">
      <div class="step-image">
        <img src="{{ "images/steps/04-development.png" | relURL }}" alt="Development">
      </div>
      <div class="step-text">
        <span class="step-number">04</span>
        <h3 class="step-title">Development</h3>
      </div>
    </div>
  </section>


</div>
{{ end }}
