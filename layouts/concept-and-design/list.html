{{ define "main" }}
<div class="page-gradient">

  {{ partial "hero-text.html" (dict
    "title" "Concept &amp; Design"
    "subtitle" "Bring your ideas, we&rsquo;ll do the rest!"
  ) }}

  <!-- Step 01 -->
  <section class="section step-section">
    <div class="step step-left">
      <div class="step-text">
        <span class="step-number">01</span>
        <h3 class="step-title">Design Docs &amp; Storyboarding</h3>
      </div>
      <div class="step-image">
        <img src="/images/steps/01-design-docs.png" alt="Design Docs & Storyboarding">
      </div>
    </div>
  </section>

  <!-- Step 02 -->
  <section class="section step-section">
    <div class="step step-right">
      <div class="step-image">
        <img src="/images/steps/02-planning.png" alt="Planning & Wireframing">
      </div>
      <div class="step-text">
        <span class="step-number">02</span>
        <h3 class="step-title">Planning &amp; Wireframing</h3>
      </div>
    </div>
  </section>

  <!-- Step 03 -->
  <section class="section step-section">
    <div class="step step-left">
      <div class="step-text">
        <span class="step-number">03</span>
        <h3 class="step-title">Schematics</h3>
      </div>
      <div class="step-image">
        <img src="/images/steps/03-schematics.png" alt="Schematics">
      </div>
    </div>
  </section>

  <!-- Step 04 -->
  <section class="section step-section">
    <div class="step step-right">
      <div class="step-image">
        <img src="/images/steps/04-development.png" alt="Development">
      </div>
      <div class="step-text">
        <span class="step-number">04</span>
        <h3 class="step-title">Development</h3>
      </div>
    </div>
  </section>

  <!-- Who we work with -->
  <section class="section">
    <h2>Who we work with</h2>
    <img src="/images/steps/client-logos.png" alt="Our clients" class="client-logos-bar">
    <div class="cta-center">
      <a href="/contact/" class="btn">Ready to start? Get in touch!</a>
    </div>
  </section>

</div>
{{ end }}
