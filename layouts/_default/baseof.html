<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@400;500;600&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon-32x32.png" | relURL }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ "favicon-192x192.png" | relURL }}">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body class="{{ with .Params.bodyClass }}{{ . }}{{ end }}{{ if .IsHome }} home{{ end }}" data-base-path="{{ "" | relURL }}">
  <a class="skip-link" href="#content">Skip to content</a>

  {{ partial "header.html" . }}

  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ if not .IsHome }}{{ partial "footer.html" . }}{{ end }}

  <div id="shader-bg"></div>
  <script src="{{ "js/main.js" | relURL }}"></script>
  <script src="{{ "js/carousel.js" | relURL }}"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="{{ "js/shader-bg.js" | relURL }}"></script>
</body>
</html>
